<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRA Freshy เซียมซีนำโชค</title>
  
  <!-- Font Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans Thai"', 'sans-serif'],
          },
          colors: {
            cra: {
              red: '#b52b27',
              darkred: '#7c1a17',
              gold: '#f4c430',
              bg: '#0b0b0f',
              card: '#15151e',
              border: '#2d2d3f'
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom styles for elements too complex for Tailwind utilities */
    :root {
      --gold-gradient: linear-gradient(135deg, #ffe875 0%, #f4c430 40%, #b8860b 75%, #ffe875 100%);
    }
    
    body { background-color: #0b0b0f; overflow: hidden; }

    /* ลายน้ำฉากหลัง */
    .bg-pattern {
      position: fixed; top: -20%; left: -30%; width: 160%; height: 140%;
      color: rgba(244, 196, 48, 0.03); font-size: 40px; font-weight: 800; line-height: 2.2; letter-spacing: 6px;
      transform: rotate(-25deg); pointer-events: none; z-index: 1; text-align: left; word-wrap: break-word;
      content: 'CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA';
    }

    /* Custom Dropdown Animation */
    .custom-options {
      opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .custom-select-wrapper.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
    .custom-select-wrapper.open svg.chevron { transform: rotate(180deg); }

    /* Sections Animation */
    .step-section { display: none; animation: fadeIn 0.5s ease; }
    .step-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- รูปกระบอกเซียมซีหน้าแรก --- */
    .preview-siamsi {
      width: 130px; height: 150px; margin: 0 auto 15px auto; position: relative;
      filter: drop-shadow(0 0 15px rgba(244, 196, 48, 0.35)); animation: preview-idle 3s infinite ease-in-out;
    }
    .preview-cylinder {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 85px; height: 110px; background: var(--gold-gradient);
      border-radius: 10px 10px 25px 25px; border: 1.5px solid #fff3cc; box-shadow: inset 0 -15px 20px rgba(0,0,0,0.55); z-index: 2;
      display: flex; justify-content: center; align-items: center;
    }
    .preview-cylinder::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 14px; background: #382703; border-radius: 5px 5px 0 0; border-bottom: 1.5px solid #f4c430;
    }
    .preview-band {
      position: absolute; top: 35px; width: 100%; height: 28px; background: linear-gradient(90deg, #601210 0%, #b52b27 50%, #601210 100%);
      border-top: 1px solid #f4c430; border-bottom: 1px solid #f4c430; display: flex; justify-content: center; align-items: center;
    }
    .preview-logo { font-size: 11px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .preview-stick {
      position: absolute; width: 6px; height: 90px; background: linear-gradient(to top, #b8860b, #f4c430, #fffdd0);
      border-radius: 4px 4px 0 0; z-index: 1; bottom: 70px;
    }
    .preview-stick::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: #b52b27; border-radius: 4px 4px 0 0; }
    .preview-stick-1 { left: 45px; transform: rotate(-10deg); } .preview-stick-2 { left: 62px; transform: rotate(1deg); } .preview-stick-3 { left: 78px; transform: rotate(12deg); }
    @keyframes preview-idle { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(2deg); } }

    /* --- กระบอกเซียมซี Interactive --- */
    .siamsi-wrapper { position: relative; width: 160px; height: 250px; margin: 20px auto; filter: drop-shadow(0 0 20px rgba(244, 196, 48, 0.3)); cursor: pointer; transition: transform 0.1s; }
    .siamsi-wrapper:active { transform: scale(0.95); }
    .cylinder {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 115px; height: 180px; background: var(--gold-gradient);
      border-radius: 12px 12px 45px 45px / 12px 12px 25px 25px; border: 2px solid #fff3cc; box-shadow: inset 0 -25px 35px rgba(0,0,0,0.65), 0 15px 25px rgba(0,0,0,0.6); z-index: 3; overflow: hidden;
    }
    .cylinder::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 24px; background: #382703; border-radius: 10px 10px 0 0; box-shadow: inset 0 6px 15px rgba(0,0,0,0.9); border-bottom: 2px solid #f4c430; z-index: 6;
    }
    .cylinder-pattern-bg {
      position: absolute; top: 24px; left: 0; width: 100%; height: 156px; opacity: 0.15;
      background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%);
      background-size: 20px 20px; z-index: 4;
    }
    .cylinder-band {
      position: absolute; top: 60px; left: 0; width: 100%; height: 48px; background: linear-gradient(90deg, #601210 0%, #b52b27 50%, #601210 100%); border-top: 2px solid #f4c430; border-bottom: 2px solid #f4c430; z-index: 5; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
    .cra-logo { font-size: 20px; font-weight: 800; color: #ffffff; letter-spacing: 3px; text-shadow: 0 0 8px #f4c430, 0 2px 3px #000; }
    .stick-base {
      position: absolute; width: 8px; height: 130px; background: linear-gradient(to top, #b8860b, #f4c430, #fffdd0); border-radius: 5px 5px 0 0; z-index: 2; bottom: 90px; box-shadow: 2px 0 5px rgba(0,0,0,0.5);
    }
    .stick-base::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 18px; background: linear-gradient(to bottom, #d9534f, #7c1a17); border-radius: 5px 5px 0 0; }
    .stick-1 { left: 52px; transform: rotate(-9deg); bottom: 105px; } .stick-2 { left: 68px; transform: rotate(-3deg); bottom: 122px; } .stick-3 { left: 84px; transform: rotate(4deg); bottom: 112px; } .stick-4 { left: 98px; transform: rotate(10deg); bottom: 118px; } .stick-5 { left: 76px; transform: rotate(-1deg); bottom: 130px; }
    .shaking .cylinder { animation: cylinder-tilt 0.12s infinite linear; } .shaking .stick-base { animation: sticks-jump 0.12s infinite ease-in-out; }
    @keyframes cylinder-tilt { 0%, 100% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-58%) rotate(-13deg); } 75% { transform: translateX(-42%) rotate(13deg); } }
    @keyframes sticks-jump { 0%, 100% { bottom: 100px; } 50% { bottom: 140px; } }

    /* --- OVERLAY STYLES --- */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(3, 3, 5, 0.94);
      z-index: 999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease;
    }
    .overlay.show { display: flex; opacity: 1; }
    .result-card { 
      width: 85%; max-width: 380px; padding: 45px 25px; border-radius: 25px; text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8); transform: scale(0.85); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 1001;
    }
    .card-winner { background: #141410; border: 2px solid #f4c430; box-shadow: 0 0 50px rgba(244, 196, 48, 0.35), 0 30px 60px rgba(0,0,0,0.8); }
    .card-loser { background: #191921; border: 2px solid #47475c; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .result-visual-zone { margin: 10px auto 25px auto; display: flex; justify-content: center; align-items: center; min-height: 140px; }
    .trophy-award {
      position: relative; width: 80px; height: 90px; background: var(--gold-gradient); border-radius: 5px 5px 40px 40px; filter: drop-shadow(0 0 25px rgba(244, 196, 48, 0.75)); animation: trophy-glow 2s infinite ease-in-out;
    }
    .trophy-award::before { content: ''; position: absolute; top: 10px; left: -20px; width: 120px; height: 35px; border: 8px solid #f4c430; border-radius: 50%; z-index: -1; box-sizing: border-box; }
    .trophy-award::after { content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 70px; height: 20px; background: linear-gradient(to right, #444, #222, #444); border-radius: 4px; }
    .trophy-stem { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 16px; height: 15px; background: var(--gold-gradient); z-index: 1; }
    @keyframes trophy-glow { 0%, 100% { filter: drop-shadow(0 0 25px rgba(244, 196, 48, 0.6)); transform: scale(1); } 50% { filter: drop-shadow(0 0 40px rgba(244, 196, 48, 0.9)); transform: scale(1.05); } }
    
    #effectCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: none; }
    
    /* Sweet Alert Custom */
    .swal2-popup { border-radius: 20px !important; border: 1px solid rgba(244, 196, 48, 0.3) !important; font-family: 'Noto Sans Thai', sans-serif !important; }
    .swal2-title { color: #f4c430 !important; }
    .swal2-html-container { color: #eee !important; }
  </style>
</head>

<body class="flex justify-center items-center min-h-screen text-white text-center m-0 p-4">

<div class="bg-pattern">CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA CRA</div>
<canvas id="effectCanvas"></canvas>

<!-- Main Card Container (Tailwind Style) -->
<div class="w-full max-w-[420px] bg-cra-card p-8 md:p-10 rounded-[30px] shadow-[0_20px_50px_rgba(0,0,0,0.6)] border border-cra-gold/25 relative z-10 overflow-visible">
  
  <!-- หน้าแรก (Setup Form) -->
  <div id="setupStep" class="step-section active">
    
    <!-- Graphic Header -->
    <div class="preview-siamsi">
      <div class="preview-stick preview-stick-1"></div>
      <div class="preview-stick preview-stick-2"></div>
      <div class="preview-stick preview-stick-3"></div>
      <div class="preview-cylinder">
        <div class="preview-band"><span class="preview-logo">CRA Freshy</span></div>
      </div>
    </div>
    
    <h2 class="font-bold text-cra-gold text-2xl md:text-3xl mb-1 shadow-cra-gold/40 drop-shadow-md">🔮 เซียมซีนำโชค</h2>
    <div class="text-[#8a8a9e] text-sm mb-6 leading-relaxed">
      วันนี้วันดี ยินดีต้อนรับนักศึกษาใหม่<br>
      คุณพร้อมเสี่ยงดวงลุ้นรางวัลจากห้องสมุดเราไหม?<br>
      มาเริ่มเซียมซีกัน!
    </div>
    
    <!-- Form Area -->
    <div class="space-y-4">
      
      <!-- Dropdown คำนำหน้า (Custom built for Tailwind) -->
      <div class="relative z-50 text-left">
        <div class="custom-select-wrapper" id="prefixWrapper">
          <div class="custom-select-trigger w-full px-4 py-3.5 bg-white/5 border border-cra-border text-gray-400 rounded-xl text-base flex justify-between items-center cursor-pointer transition-all duration-300 hover:border-gray-500" onclick="toggleDropdown()">
            <div class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              <span id="prefixText">เลือกคำนำหน้า</span>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="chevron h-4 w-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
          <div class="custom-options absolute top-[110%] left-0 w-full bg-[#1c1c28] border border-cra-border rounded-xl z-50 overflow-hidden shadow-2xl">
            <div class="p-3 text-white cursor-pointer transition-colors duration-200 hover:bg-[#2d2d3f] hover:text-cra-gold flex items-center" onclick="selectPrefix('นาย')">
              <span class="ml-8">นาย</span>
            </div>
            <div class="p-3 text-white cursor-pointer transition-colors duration-200 hover:bg-[#2d2d3f] hover:text-cra-gold flex items-center" onclick="selectPrefix('นางสาว')">
              <span class="ml-8">นางสาว</span>
            </div>
          </div>
          <input type="hidden" id="inpPrefix">
        </div>
      </div>
      
      <!-- ชื่อ - นามสกุล (Grid) -->
      <div class="grid grid-cols-2 gap-3 z-40 relative">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
          </div>
          <input type="text" id="inpFname" placeholder="ชื่อจริง" required class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-cra-border rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-cra-gold focus:ring-1 focus:ring-cra-gold transition-all duration-300">
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
            </svg>
          </div>
          <input type="text" id="inpLname" placeholder="นามสกุล" required class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-cra-border rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-cra-gold focus:ring-1 focus:ring-cra-gold transition-all duration-300">
        </div>
      </div>
      
      <!-- เบอร์โทรศัพท์ -->
      <div class="relative z-30">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <input type="tel" id="inpPhone" placeholder="08x-xxx-xxxx" maxlength="12" required class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-cra-border rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-cra-gold focus:ring-1 focus:ring-cra-gold transition-all duration-300 tracking-wide font-medium">
      </div>

    </div>

    <!-- Submit Button -->
    <button id="btnStart" onclick="startApp()" class="w-full mt-7 py-4 text-lg font-bold rounded-xl text-white bg-gradient-to-br from-cra-red to-cra-darkred shadow-[0_5px_20px_rgba(181,43,39,0.3)] hover:shadow-[0_8px_25px_rgba(181,43,39,0.5)] hover:-translate-y-0.5 transition-all duration-300 relative z-20">
      เริ่มเสี่ยงเซียมซี
    </button>
  </div>

  <!-- หน้าที่สอง (Shake Zone) -->
  <div id="shakeStep" class="step-section">
    <h2 class="font-bold text-cra-gold text-2xl mb-2 drop-shadow-md">ตั้งจิตอธิษฐาน</h2>
    <p class="text-[#ddd] text-base mb-6 leading-relaxed">จับมือถือให้แน่นแล้ว<b class="text-white font-semibold">"แตะรัวๆ"</b> ที่กระบอกเซียมซี</p>
    
    <div id="siamsi-container" class="siamsi-wrapper" onclick="triggerManualTap()">
      <div class="stick-base stick-1"></div>
      <div class="stick-base stick-2"></div>
      <div class="stick-base stick-3"></div>
      <div class="stick-base stick-4"></div>
      <div class="stick-base stick-5"></div>
      <div class="cylinder">
        <div class="cylinder-pattern-bg"></div>
        <div class="cylinder-band"><span class="cra-logo">CRA 10</span></div>
      </div>
    </div>
    
    <div class="w-4/5 h-1.5 bg-[#222230] mx-auto mt-8 rounded-full overflow-hidden">
      <div id="pBar" class="h-full bg-gradient-to-r from-cra-red to-cra-gold w-0 transition-[width] duration-100 ease-linear shadow-[0_0_8px_#f4c430]"></div>
    </div>
    <p id="status" class="text-cra-gold text-[15px] mt-4 min-h-[24px] font-semibold">รอแรงสั่นสะเทือน...</p>
  </div>
</div>

<!-- Overlay Result -->
<div id="resultOverlay" class="overlay backdrop-blur-sm">
  <div id="resultCard" class="result-card">
    <div id="visualZone" class="result-visual-zone"></div>
    <div id="resultTitle" class="font-bold text-2xl mb-4"></div>
    <p id="resultText" class="text-base leading-relaxed mb-8"></p>
    
    <div id="officerArea" style="display:none;">
      <button class="w-full py-4 text-base font-bold rounded-xl text-white bg-gradient-to-br from-[#0275d8] to-[#014c8e] shadow-[0_5px_15px_rgba(2,117,216,0.3)] hover:-translate-y-0.5 transition-all duration-300" onclick="officerConfirm()">ยืนยันมอบของรางวัล (เจ้าหน้าที่)</button>
    </div>
    
    <!-- แก้ไขตรง id="closeArea" โดยเพิ่ม class="space-y-3" และเพิ่มปุ่ม Linktree -->
    <div id="closeArea" style="display:none;" class="space-y-3">
      <button class="w-full py-4 text-base font-bold rounded-xl text-white bg-gradient-to-br from-[#10b981] to-[#047857] shadow-[0_5px_20px_rgba(16,185,129,0.3)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2" onclick="window.open('https://linktr.ee/CRAlibrary', '_blank')">
        <!-- ไอคอน Link -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd" />
        </svg>
        ช่องทางการติดตามห้องสมุด
      </button>
      <button class="w-full py-4 text-base font-bold rounded-xl text-white bg-gradient-to-br from-cra-red to-cra-darkred shadow-[0_5px_20px_rgba(181,43,39,0.3)] hover:-translate-y-0.5 transition-all duration-300" onclick="closeOverlay()">กลับสู่หน้าหลัก</button>
    </div>
  </div>
</div>

<script>
  /* =========================================
     🔥 ตั้งค่า API URL ตรงนี้ก่อนเอาขึ้น GitHub 🔥
     ========================================= */
  // นำ URL ที่ได้จากการ Deploy Google Apps Script แบบ Web App (ที่ลงท้ายด้วย /exec) มาวางในเครื่องหมายคำพูดด้านล่าง
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycby2e9b_Rj4fvpN1fYQf8PzqwFljEqccppnkQMrle7gFeeji-uBzi0IqXZk3g56-uIgX/exec';
  // =========================================

  // ฟังก์ชันกลางสำหรับเรียก API ไปหา Google Script แบบไม่ติด CORS
  async function fetchGAS(action, payload) {
    try {
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        // ส่งเป็น text/plain เพื่อหลบเลี่ยงปัญหา Preflight (CORS) ของ Google Script
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, payload: payload })
      });
      return await response.json();
    } catch (error) {
      console.error('API Error:', error);
      throw error;
    }
  }

  // --- Variables ---
  let hasShaken = false;
  let lastX, lastY, lastZ;
  let moveCounter = 0;
  let stopShakeTimeout;
  let isAudioAllowed = false;
  let finalPayload = {};

  const loserQuotes = [
    "ยินดีด้วยที่เข้ามหาลัย! จากนี้ไปคุณได้เข้าสู่ยุค 'ใช้ชีวิตไปลุ้นไป' อย่างเป็นทางการ",
    "ทำวันนี้ให้ดีที่สุด แล้วพรุ่งนี้ค่อยนอนต่อ",
    "อย่าเครียดเรื่องเรียน เพราะอาจารย์ไม่รู้ว่าเราเครียด",
    "ไม่ต้องวิ่งตามความฝัน นอนต่อดีกว่า เดี๋ยวความฝันมาหาเอง",
    "ถึงรอบนี้ดวงรางวัลจะยังไม่มา แต่ดวงการเรียนปังแน่นอน ขอให้เทอมนี้คว้าเกรด A มาครองแทนรางวัลนะเฟรชชี่",
    "ยินดีด้วย คุณได้เก็บแต้มบุญรางวัลใหญ่ไว้ใช้ตอนสอบ มิดเทอมนี้อ่านตรงไหนก็ออกตรงนั้น คะแนนท็อปเซกชัวร์",
    "รางวัลใหญ่อาจเป็นของคนอื่น แต่ความสุขและความสนุกในรั้วมหาลัยตลอด 4 ปีต่อจากนี้จะเป็นของคุณแน่นอน",
    "ระบบแจ้งว่าดวงคุณไม่ได้นก แค่กำลังสะสมพลังไปสุ่มเจอเพื่อนร่วมเซกที่ดี และรุ่นพี่ที่คอยช่วยเหลือซัพพอร์ต",
    "ไม่มีของรางวัลแจกให้ มีแต่คำอวยพรสุดเอ็กซ์คลูซีฟส่งตรงถึงคุณ: ขอให้เป็นเฟรชชี่ที่มีความสุขที่สุดในรุ่น",
    "อกหักจากรางวัลในเกมวันนี้ เพื่อไปสมหวังกับทุกโปรเจกต์และทุกวิชาโหดๆ ที่ต้องเจอต่อจากนี้นะ สู้ๆ",
    "ของรางวัลชิ้นใหญ่ที่สุดในตอนนี้ คือการที่คุณได้ก้าวเข้ามาเป็นนักศึกษาใหม่ที่นี่ ยินดีต้อนรับสู่บ้านหลังใหม่นะ",
    "รางวัลในเกมเป็นแค่ทางผ่าน การได้มิตรภาพดีๆ และเรียนจบพร้อมกันต่างหากคือชัยชนะที่แท้จริง",
    "เฉียดรางวัลไปนิดเดียว แต่ความเก่งและสติปัญญาของคุณจะไม่เฉียดแน่นอน ทุกวิชาที่ลงเรียนผ่านฉลุยไร้กังวล",
    "ถึงไม่ได้ของรางวัลติดมือกลับไป แต่คุณได้รับตั๋วความโชคดีตลอดปี 1 ขอให้ทุกวันมีแต่รอยยิ้มและเรื่องราวดีๆ",
    "ยินดีต้อนรับเฟรชชี่สู่ชีวิตที่แท้จริง! สัปดาห์แรกจะรู้สึกเหมือนมาเที่ยว สัปดาห์ต่อมาจะเริ่มสงสัยว่าเรามาทำอะไรที่นี่ และสัปดาห์สอบจะอยากกลับไปเป็นทารกอีกครั้ง"
  ];

  const boxShakeAudio = new Audio('https://www.soundjay.com/misc/sounds/shaking-dice-1.mp3');
  boxShakeAudio.loop = true; 

  function toggleDropdown() { document.getElementById('prefixWrapper').classList.toggle('open'); }
  function selectPrefix(val) {
    document.getElementById('inpPrefix').value = val;
    document.getElementById('prefixText').innerText = val;
    document.getElementById('prefixText').classList.add('text-white');
    document.getElementById('prefixWrapper').classList.remove('open');
    document.querySelector('.custom-select-trigger').classList.add('border-cra-gold', 'ring-1', 'ring-cra-gold');
    setTimeout(() => document.querySelector('.custom-select-trigger').classList.remove('border-cra-gold', 'ring-1', 'ring-cra-gold'), 500);
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.custom-select-wrapper')) { document.getElementById('prefixWrapper').classList.remove('open'); }
  });

  const phoneInput = document.getElementById('inpPhone');
  phoneInput.addEventListener('input', function (e) {
    let target = e.target;
    let input = target.value.replace(/\D/g, '').substring(0, 10); 
    let formatted = input;
    if (input.length > 6) {
      formatted = `${input.substring(0, 3)}-${input.substring(3, 6)}-${input.substring(6, 10)}`;
    } else if (input.length > 3) {
      formatted = `${input.substring(0, 3)}-${input.substring(3, 6)}`;
    }
    target.value = formatted;
  });

  function playRealSound() { if (boxShakeAudio.paused && !hasShaken && isAudioAllowed) boxShakeAudio.play().catch(e => console.log("Audio blocked")); }
  function stopRealSound() { boxShakeAudio.pause(); boxShakeAudio.currentTime = 0; }

  async function startApp() {
    if(GAS_API_URL === 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE') {
      Swal.fire('Error', 'ยังไม่ได้ตั้งค่า API URL ในโค้ด', 'error'); return;
    }

    const prefix = document.getElementById('inpPrefix').value;
    const fname = document.getElementById('inpFname').value.trim();
    const lname = document.getElementById('inpLname').value.trim();
    const rawPhone = document.getElementById('inpPhone').value.trim();
    
    if(!prefix || !fname || !lname || !rawPhone) {
      Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกข้อมูลให้ครบถ้วนก่อนเปิดดวงชะตาครับ', background: '#1c1c28', color: '#fff', confirmButtonColor: '#b52b27' });
      return;
    }
    if(rawPhone.length !== 12) {
      Swal.fire({ icon: 'warning', title: 'เบอร์โทรไม่ถูกต้อง', text: 'กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก', background: '#1c1c28', color: '#fff', confirmButtonColor: '#b52b27' });
      return;
    }

    const cleanPhone = rawPhone.replace(/-/g, '');
    const fullName = prefix + fname + " " + lname;
    
    const btn = document.getElementById('btnStart');
    btn.innerText = 'กำลังตรวจสอบดวงชะตา...';
    btn.disabled = true;
    btn.classList.add('opacity-60', 'cursor-not-allowed');

    try {
      // เรียกใช้ API เช็คข้อมูลซ้ำ
      const res = await fetchGAS('checkDuplicate', { fullName: fullName, phone: cleanPhone });
      
      btn.innerText = 'เริ่มเสี่ยงเซียมซี';
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-not-allowed');

      if (res.isDuplicate) {
        Swal.fire({
          title: 'คุณเคยเสี่ยงดวงไปแล้ว!', text: "ต้องการดูผลลัพธ์เดิมอีกรอบหรือไม่?", icon: 'info',
          showCancelButton: true, confirmButtonColor: '#f4c430', cancelButtonColor: '#2d2d3f',
          confirmButtonText: '<span class="text-black font-bold">ใช่, ดูผลเดิม</span>', cancelButtonText: 'ยกเลิก',
          background: '#1c1c28', color: '#fff'
        }).then((result) => {
          if (result.isConfirmed) {
            finalPayload = { prefix: prefix, fname: fname, lname: lname, phone: cleanPhone, overwrite: true, oldRowIndex: res.rowIndex, oldStatus: res.oldStatus };
            prepareShake();
          }
        });
      } else {
        finalPayload = { prefix: prefix, fname: fname, lname: lname, phone: cleanPhone, overwrite: false };
        prepareShake();
      }
    } catch (err) {
      Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง', 'error');
      btn.innerText = 'เริ่มเสี่ยงเซียมซี';
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-not-allowed');
    }
  }

  function prepareShake() {
    isAudioAllowed = true;
    boxShakeAudio.load(); 
    document.getElementById('setupStep').classList.remove('active');
    document.getElementById('shakeStep').classList.add('active');
    if(typeof DeviceMotionEvent !== 'undefined') window.addEventListener('devicemotion', handleMotion, false);
  }

  function triggerManualTap() {
    if (hasShaken) return;
    moveCounter += 3; 
    executeShakeVisuals();
  }

  function handleMotion(event) {
    if (hasShaken) return;
    let acc = event.accelerationIncludingGravity;
    if(!acc.x) return;
    if (lastX === undefined) { lastX = acc.x; lastY = acc.y; lastZ = acc.z; return; }
    let delta = Math.abs(lastX - acc.x) + Math.abs(lastY - acc.y) + Math.abs(lastZ - acc.z);
    if (delta > 15) { moveCounter += 2; executeShakeVisuals(); }
    lastX = acc.x; lastY = acc.y; lastZ = acc.z;
  }

  async function executeShakeVisuals() {
    const container = document.getElementById('siamsi-container');
    container.classList.add('shaking');
    document.getElementById('status').innerText = 'กำลังเปิดดวงชะตาด้วยแรงศรัทธา...';
    playRealSound();

    let pct = Math.min((moveCounter / 40) * 100, 100);
    document.getElementById('pBar').style.width = pct + '%';

    clearTimeout(stopShakeTimeout);
    stopShakeTimeout = setTimeout(() => {
      container.classList.remove('shaking');
      stopRealSound(); 
      if(!hasShaken && moveCounter < 40) document.getElementById('status').innerText = 'อย่าเพิ่งหยุด! เขย่าต่ออีกนิดครับ...';
    }, 250);
    
    if (moveCounter >= 40 && !hasShaken) {
      hasShaken = true;
      clearTimeout(stopShakeTimeout);
      container.classList.remove('shaking');
      stopRealSound(); 
      document.getElementById('status').innerText = 'ลิขิตฟ้าปรากฏแล้ว กำลังประมวลผล...';
      
      try {
        // ส่งข้อมูลไปเซฟและสุ่มรางวัลผ่าน API
        const res = await fetchGAS('saveAndRoll', finalPayload);
        if(res.error) { Swal.fire('Error', res.error, 'error'); return; }
        showResultOverlay(res);
      } catch (err) {
        Swal.fire('Error', 'เซิร์ฟเวอร์ขัดข้อง โปรดรีเฟรชหน้าเว็บ', 'error');
      }
    }
  }

  function showResultOverlay(res) {
    const overlay = document.getElementById('resultOverlay');
    const cardEl = document.getElementById('resultCard');
    const visualZone = document.getElementById('visualZone');
    const titleEl = document.getElementById('resultTitle');
    const textEl = document.getElementById('resultText');
    const officerArea = document.getElementById('officerArea');
    const closeArea = document.getElementById('closeArea');

    cardEl.className = "result-card";
    visualZone.innerHTML = ""; 

    if (res.isWinner) {
      cardEl.classList.add('card-winner');
      visualZone.innerHTML = '<div class="trophy-award"><div class="trophy-stem"></div></div>';
      titleEl.innerText = 'ยินดีด้วยคุณคือผู้โชคดี!';
      titleEl.className = "font-bold text-2xl mb-4 text-cra-gold drop-shadow-[0_0_10px_rgba(244,196,48,0.5)]";
      
      if(res.status === "CLAIMED") {
        textEl.innerHTML = `<span class="block text-xl text-white font-bold mb-3 border-b border-cra-gold/30 pb-2">${res.fullName}</span>คุณได้รับรางวัลไปเรียบร้อยแล้ว<br><span class='text-green-500 font-bold'>[ สถานะ: ใช้สิทธิ์แล้ว ]</span>`;
        officerArea.style.display = 'none'; closeArea.style.display = 'block';
      } else {
        textEl.innerHTML = `<span class="block text-xl text-white font-bold mb-3 border-b border-cra-gold/30 pb-2">${res.fullName}</span>คุณได้รับรางวัล! <br>โปรดแคปหน้าจอนี้ ส่งไปที่ LINE OA :CRA Library เพื่อให้เจ้าหน้าที่ตรวจสอบ หรือนำหน้าจอนี้ไปแสดงต่อเจ้าหน้าที่บูธห้องสมุดเพื่อรับรางวัล 🎁`;
        officerArea.style.display = 'block'; closeArea.style.display = 'none';
        document.getElementById('officerArea').innerHTML = `<button class="w-full py-4 text-base font-bold rounded-xl text-white bg-gradient-to-br from-[#0275d8] to-[#014c8e] shadow-[0_5px_15px_rgba(2,117,216,0.3)] hover:-translate-y-0.5 transition-all duration-300" onclick="officerConfirm(${res.rowNumber})">ยืนยันมอบของรางวัล (เจ้าหน้าที่)</button>`;
      }
      startVisualEffect(true);
    } else {
      cardEl.classList.add('card-loser');
      visualZone.innerHTML = '<span class="text-[110px] leading-none drop-shadow-[0_0_20px_rgba(71,71,92,0.6)]">😭</span>';
      titleEl.innerText = 'อดเบยย... เสียใจด้วยนะ';
      titleEl.className = "font-bold text-2xl mb-4 text-[#a2a2ba] italic";
      let quote = loserQuotes[Math.floor(Math.random() * loserQuotes.length)];
      textEl.innerHTML = `<span class="block text-xl text-white font-bold mb-3 border-b border-gray-600 pb-2">${res.fullName}</span>"${quote}"`;
      officerArea.style.display = 'none'; closeArea.style.display = 'block';
      startVisualEffect(false);
    }
    
    document.getElementById('status').innerText = 'ผลลัพธ์ปรากฏแล้ว';
    overlay.classList.add('show');
    cardEl.style.transform = "scale(1)";
  }

  function closeOverlay() {
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('resultCard').style.transform = "scale(0.85)";
    stopVisualEffect();
    
    document.getElementById('shakeStep').classList.remove('active');
    document.getElementById('setupStep').classList.add('active');
    
    document.getElementById('inpPrefix').value = '';
    document.getElementById('prefixText').innerText = 'เลือกคำนำหน้า';
    document.getElementById('prefixText').classList.remove('text-white');
    document.getElementById('inpFname').value = '';
    document.getElementById('inpLname').value = '';
    document.getElementById('inpPhone').value = '';
    
    document.getElementById('pBar').style.width = '0%';
    document.getElementById('status').innerText = 'รอแรงสั่นสะเทือน...';
    moveCounter = 0; hasShaken = false; finalPayload = {};
  }

  function officerConfirm(rowNumber) {
    Swal.fire({
      title: 'รหัสผ่านเจ้าหน้าที่', input: 'password', inputPlaceholder: 'กรอกรหัส PIN',
      showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก',
      confirmButtonColor: '#28a745', background: '#1c1c28', color: '#fff'
    }).then(async (result) => {
      if (result.isConfirmed) {
        if (result.value !== "1234") { Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'รหัสผ่านไม่ถูกต้อง!', background: '#1c1c28', color: '#fff', confirmButtonColor: '#b52b27' }); return; }

        document.getElementById('resultTitle').innerText = 'กำลังจารึกเกียรติยศ...';
        document.getElementById('officerArea').style.display = 'none';

        try {
          // เรียก API เพื่อยืนยันของรางวัล
          await fetchGAS('confirmReward', { rowNumber: rowNumber });
          
          document.getElementById('visualZone').innerHTML = '<span class="text-[100px] leading-none">✨</span>';
          document.getElementById('resultTitle').innerText = 'จารึกรายชื่อโชคดีสำเร็จ';
          document.getElementById('resultTitle').className = "font-bold text-2xl mb-4 text-green-500";
          document.getElementById('resultText').innerHTML = 'เจ้าหน้าที่ได้ทำการลงบันทึกมอบของรางวัลเข้าระบบเรียบร้อยแล้ว!';
          document.getElementById('closeArea').style.display = 'block';
        } catch(err) {
          Swal.fire('Error', 'บันทึกไม่สำเร็จ โปรดลองอีกครั้ง', 'error');
          document.getElementById('officerArea').style.display = 'block';
        }
      }
    });
  }

  let canvas = document.getElementById('effectCanvas'); let ctx = canvas.getContext('2d');
  let elements = []; let animationFrameId = null; let effectMode = 'winner';
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  class Particle {
    constructor(isWinner) {
      this.isWinner = isWinner;
      if (isWinner) {
        this.x = window.innerWidth / 2; this.y = window.innerHeight / 2.5; this.size = Math.random() * 6 + 4;
        this.speedX = (Math.random() - 0.5) * 10; this.speedY = (Math.random() - 0.7) * 14; 
        this.gravity = 0.22; this.color = `hsl(${Math.random() * 15 + 42}, 100%, ${Math.random() * 20 + 60}%)`;
        this.alpha = 1; this.decay = Math.random() * 0.012 + 0.005;
        this.rotation = Math.random() * Math.PI; this.rotationSpeed = (Math.random() - 0.5) * 0.25;
      } else {
        this.x = Math.random() * window.innerWidth; this.y = Math.random() * -100; this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 1; this.speedY = Math.random() * 6 + 6; this.alpha = Math.random() * 0.4 + 0.2;
      }
    }
    update() {
      if (this.isWinner) { this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; this.rotation += this.rotationSpeed; } 
      else { this.y += this.speedY; this.x += this.speedX; }
    }
    draw() {
      ctx.save(); ctx.globalAlpha = this.alpha;
      if (this.isWinner) {
        ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.lineTo(this.size / 1.4, 0); ctx.lineTo(0, this.size); ctx.lineTo(-this.size / 1.4, 0); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.fillRect(-1, -1, 2, 2);
      } else {
        ctx.strokeStyle = 'rgba(156, 163, 175, 0.4)'; ctx.lineWidth = this.size;
        ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.speedX * 2, this.y + 12); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function animateEffect() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (effectMode === 'winner') { if (elements.length < 150 && Math.random() < 0.7) for(let i=0; i<3; i++) elements.push(new Particle(true)); } 
    else { if (elements.length < 100) elements.push(new Particle(false)); }
    for (let i = elements.length - 1; i >= 0; i--) {
      elements[i].update(); elements[i].draw();
      if (effectMode === 'winner') { if (elements[i].alpha <= 0 || elements[i].y > canvas.height) elements.splice(i, 1); } 
      else { if (elements[i].y > canvas.height) elements.splice(i, 1); }
    }
    animationFrameId = requestAnimationFrame(animateEffect);
  }

  function startVisualEffect(isWinner) {
    canvas.style.display = 'block'; window.addEventListener('resize', resizeCanvas); resizeCanvas();
    elements = []; effectMode = isWinner ? 'winner' : 'loser';
    if (isWinner) for (let i = 0; i < 70; i++) elements.push(new Particle(true));
    animateEffect();
  }

  function stopVisualEffect() { canvas.style.display = 'none'; cancelAnimationFrame(animationFrameId); window.removeEventListener('resize', resizeCanvas); }
</script>
